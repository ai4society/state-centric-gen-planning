[project]
name = "state-centric-plan"
version = "0.1.0"
description = "State-Centric Learning for Plan Generation"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=2.2.6",
    "pddlpy>=0.4.4",
    "tqdm>=4.67.1",
    "wlplan ; sys_platform == 'linux'",
]

[tool.uv.workspace]
members = [
    "code/plansformer",
]

[tool.uv.sources]
wlplan = { git = "https://github.com/DillonZChen/wlplan.git" }
